name: Run Unit Tests

on:
  push:
    branches: [ cicd-tests-vasco ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # <-- Atualiza para Node.js 24

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test